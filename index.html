<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Mes Comptes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #22223b;
            --surface3: #2d2d44;
            --accent-green: #00e5a0;
            --accent-red: #ff4d6d;
            --accent-blue: #6c63ff;
            --text: #f0f0f5;
            --text-muted: #8888aa;
            --border: rgba(255,255,255,0.07);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
        }

        /* Header & Bilan */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(15,15,26,0.92); backdrop-filter: blur(20px); padding: 16px 20px; border-bottom: 1px solid var(--border); }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .app-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; }
        
        .bilan-card { margin: 16px; padding: 20px; background: linear-gradient(135deg, #1e1e35 0%, #252540 100%); border-radius: var(--radius); border: 1px solid var(--border); }
        .bilan-net { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; margin: 5px 0 15px; }
        .bilan-net.positif { color: var(--accent-green); }
        .bilan-net.negatif { color: var(--accent-red); }
        
        .bilan-row { display: flex; gap: 10px; }
        .bilan-item { flex: 1; }
        .bilan-item-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
        .bilan-item-val { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

        /* Tabs & Liste */
        .tabs { display: flex; margin: 0 16px 10px; background: var(--surface2); border-radius: var(--radius-sm); padding: 4px; }
        .tab { flex: 1; padding: 8px; border: none; background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; border-radius: 7px; }
        .tab.active { background: var(--surface3); color: var(--text); font-weight: 600; }

        .personne-card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin: 0 16px 10px; border: 1px solid var(--border); display: flex; align-items: center; gap: 14px; }
        .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; }
        .avatar.green { background: rgba(0,229,160,0.1); color: var(--accent-green); }
        .avatar.red { background: rgba(255,77,109,0.1); color: var(--accent-red); }
        .personne-info { flex: 1; }
        .personne-solde { text-align: right; font-family: 'Syne', sans-serif; font-weight: 700; }

        /* Modals & Forms */
        .overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; }
        .overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px; width: 100%; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
        .form-input, .form-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: #fff; font-family: inherit; }
        
        .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .type-btn { padding: 12px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: transparent; color: var(--text-muted); font-weight: 700; cursor: pointer; }
        .type-btn.active-green { border-color: var(--accent-green); color: var(--accent-green); background: rgba(0,229,160,0.05); }
        .type-btn.active-red { border-color: var(--accent-red); color: var(--accent-red); background: rgba(255,77,109,0.05); }

        .btn-primary { width: 100%; padding: 15px; border-radius: var(--radius-sm); border: none; background: var(--accent-blue); color: white; font-weight: 700; cursor: pointer; }
        .btn-add-top { width: 40px; height: 40px; border-radius: 50%; background: var(--accent-blue); border: none; color: white; font-size: 20px; }

        /* Detail Page */
        .page-detail { position: fixed; inset: 0; z-index: 150; background: var(--bg); display: none; flex-direction: column; }
        .page-detail.open { display: flex; overflow-y: auto; }
        .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid var(--border); }
        .tx-del-btn { background: none; border: none; color: var(--accent-red); padding: 5px; cursor: pointer; font-size: 16px; opacity: 0.6; }
        .tx-info { flex: 1; cursor: pointer; }
        .tx-note { font-weight: 500; font-size: 14px; }
        .tx-date { font-size: 11px; color: var(--text-muted); }
        .tx-montant { font-family: 'Syne', sans-serif; font-weight: 700; margin-right: 15px; }

        .btn-danger { width: 90%; margin: 20px auto; padding: 12px; background: rgba(255,77,109,0.1); color: var(--accent-red); border: 1px solid var(--accent-red); border-radius: var(--radius-sm); }
    </style>
</head>
<body>

<div id="pageMain">
    <div class="header">
        <div class="header-top">
            <span class="app-title">💰 Mes Comptes</span>
            <button class="btn-add-top" onclick="openModalPersonne()">＋</button>
        </div>
    </div>

    <div class="bilan-card">
        <div class="bilan-item-label">Bilan Global</div>
        <div class="bilan-net" id="bilanNet">0,00 DH</div>
        <div class="bilan-row">
            <div class="bilan-item">
                <div class="bilan-item-label">On me doit</div>
                <div class="bilan-item-val" style="color:var(--accent-green)" id="totalCredit">0,00 DH</div>
            </div>
            <div class="bilan-item">
                <div class="bilan-item-label">Je dois</div>
                <div class="bilan-item-val" style="color:var(--accent-red)" id="totalDebit">0,00 DH</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="setTab('tous')" id="tabTous">Tous</button>
        <button class="tab" onclick="setTab('credit')" id="tabCredit">Crédit</button>
        <button class="tab" onclick="setTab('debit')" id="tabDebit">Débit</button>
    </div>

    <div id="listePersonnes"></div>
</div>

<div class="page-detail" id="pageDetail">
    <div class="header">
        <div class="header-top">
            <button onclick="fermerDetail()" style="background:none; border:none; color:white; font-size:20px;">←</button>
            <span class="app-title" id="detailNom">Nom</span>
            <button class="btn-add-top" onclick="openModalTransaction()">＋</button>
        </div>
    </div>
    
    <div style="text-align:center; padding: 20px;">
        <div class="bilan-item-label">Solde avec cette personne</div>
        <div class="bilan-net" id="detailMontant">0,00 DH</div>
    </div>

    <div id="txList"></div>
    <button class="btn-danger" onclick="supprimerPersonne()">Supprimer cette personne</button>
</div>

<div class="overlay" id="overlayTransaction" onclick="if(event.target==this) closeModals()">
    <div class="modal">
        <div class="form-group">
            <label class="form-label">Type d'opération</label>
            <div class="type-toggle">
                <button class="type-btn" id="btnCredit" onclick="setType('CREDIT')">On me doit</button>
                <button class="type-btn" id="btnDebit" onclick="setType('DEBIT')">Je dois</button>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Montant (DH)</label>
            <input type="number" class="form-input" id="inputMontant" placeholder="0.00">
        </div>
        <div class="form-group">
            <label class="form-label">Note / Raison</label>
            <input type="text" class="form-input" id="inputNote" placeholder="Ex: Déjeuner, Prêt...">
        </div>
        <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-input" id="inputDate">
        </div>
        <button class="btn-primary" onclick="sauvegarderTransaction()">Enregistrer</button>
    </div>
</div>

<div class="overlay" id="overlayPersonne" onclick="if(event.target==this) closeModals()">
    <div class="modal">
        <div class="form-group">
            <label class="form-label">Nom de la personne</label>
            <input type="text" class="form-input" id="inputNom" placeholder="Nom">
        </div>
        <button class="btn-primary" onclick="sauvegarderPersonne()">Ajouter</button>
    </div>
</div>

<script>
    let personnes = JSON.parse(localStorage.getItem('mc_personnes') || '[]');
    let transactions = JSON.parse(localStorage.getItem('mc_transactions') || '[]');
    let personneActive = null;
    let typeActif = 'CREDIT';
    let tabActif = 'tous';
    let editTxId = null; // Pour savoir si on modifie une transaction

    function sauver() {
        localStorage.setItem('mc_personnes', JSON.stringify(personnes));
        localStorage.setItem('mc_transactions', JSON.stringify(transactions));
    }

    function formatDH(n) { return n.toLocaleString('fr-MA', { minimumFractionDigits: 2 }) + ' DH'; }

    function renderListe() {
        const liste = document.getElementById('listePersonnes');
        let totalC = 0, totalD = 0;

        liste.innerHTML = personnes.map(p => {
            const txs = transactions.filter(t => t.pid === p.id);
            const solde = txs.reduce((acc, t) => acc + (t.type === 'CREDIT' ? t.montant : -t.montant), 0);
            
            if (solde > 0) totalC += solde; else totalD += Math.abs(solde);
            
            // Filtre des onglets
            if (tabActif === 'credit' && solde <= 0) return '';
            if (tabActif === 'debit' && solde >= 0) return '';

            const cls = solde >= 0 ? 'green' : 'red';
            return `
                <div class="personne-card" onclick="ouvrirDetail('${p.id}')">
                    <div class="avatar ${cls}">${p.nom[0].toUpperCase()}</div>
                    <div class="personne-info"><strong>${p.nom}</strong></div>
                    <div class="personne-solde" style="color:var(--accent-${cls})">${formatDH(Math.abs(solde))}</div>
                </div>`;
        }).join('');

        document.getElementById('bilanNet').textContent = formatDH(totalC - totalD);
        document.getElementById('totalCredit').textContent = formatDH(totalC);
        document.getElementById('totalDebit').textContent = formatDH(totalD);
    }

    function setTab(t) {
        tabActif = t;
        document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
        document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.add('active');
        renderListe();
    }

    // GESTION PERSONNES
    function openModalPersonne() { document.getElementById('overlayPersonne').classList.add('open'); }
    function sauvegarderPersonne() {
        const nom = document.getElementById('inputNom').value.trim();
        if(!nom) return;
        personnes.push({ id: Date.now().toString(), nom });
        sauver(); closeModals(); renderListe();
    }
    function supprimerPersonne() {
        if(confirm("Supprimer cette personne et tout son historique ?")) {
            transactions = transactions.filter(t => t.pid !== personneActive.id);
            personnes = personnes.filter(p => p.id !== personneActive.id);
            sauver(); fermerDetail();
        }
    }

    // GESTION DÉTAILS & TRANSACTIONS
    function ouvrirDetail(id) {
        personneActive = personnes.find(p => p.id === id);
        document.getElementById('pageDetail').classList.add('open');
        renderDetail();
    }
    function fermerDetail() { document.getElementById('pageDetail').classList.remove('open'); renderListe(); }

    function renderDetail() {
        document.getElementById('detailNom').textContent = personneActive.nom;
        const txs = transactions.filter(t => t.pid === personneActive.id).sort((a,b) => new Date(b.date) - new Date(a.date));
        const solde = txs.reduce((acc, t) => acc + (t.type === 'CREDIT' ? t.montant : -t.montant), 0);
        
        document.getElementById('detailMontant').textContent = formatDH(Math.abs(solde));
        document.getElementById('detailMontant').style.color = solde >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';

        document.getElementById('txList').innerHTML = txs.map(t => `
            <div class="tx-item">
                <div class="tx-info" onclick="editerTx('${t.id}')">
                    <div class="tx-note">${t.note || 'Opération'}</div>
                    <div class="tx-date">${t.date}</div>
                </div>
                <div class="tx-montant ${t.type === 'CREDIT' ? 'green' : 'red'}" style="color:var(--accent-${t.type === 'CREDIT' ? 'green' : 'red'})">
                    ${t.type === 'CREDIT' ? '+' : '-'}${t.montant}
                </div>
                <button class="tx-del-btn" onclick="supprimerTx('${t.id}')">🗑</button>
            </div>`).join('');
    }

    function setType(t) {
        typeActif = t;
        document.getElementById('btnCredit').className = 'type-btn' + (t === 'CREDIT' ? ' active-green' : '');
        document.getElementById('btnDebit').className = 'type-btn' + (t === 'DEBIT' ? ' active-red' : '');
    }

    function openModalTransaction() {
        editTxId = null;
        document.getElementById('inputMontant').value = '';
        document.getElementById('inputNote').value = '';
        document.getElementById('inputDate').value = new Date().toISOString().split('T')[0];
        setType('CREDIT');
        document.getElementById('overlayTransaction').classList.add('open');
    }

    function editerTx(id) {
        const t = transactions.find(tx => tx.id === id);
        editTxId = id;
        document.getElementById('inputMontant').value = t.montant;
        document.getElementById('inputNote').value = t.note;
        document.getElementById('inputDate').value = t.date;
        setType(t.type);
        document.getElementById('overlayTransaction').classList.add('open');
    }

    function sauvegarderTransaction() {
        const montant = parseFloat(document.getElementById('inputMontant').value);
        const note = document.getElementById('inputNote').value;
        const date = document.getElementById('inputDate').value;
        if(!montant) return;

        if(editTxId) {
            const index = transactions.findIndex(t => t.id === editTxId);
            transactions[index] = { ...transactions[index], montant, note, date, type: typeActif };
        } else {
            transactions.push({ id: Date.now().toString(), pid: personneActive.id, montant, note, date, type: typeActif });
        }
        
        sauver(); closeModals(); renderDetail();
    }

    function supprimerTx(id) {
        if(confirm("Supprimer cette opération ?")) {
            transactions = transactions.filter(t => t.id !== id);
            sauver(); renderDetail();
        }
    }

    function closeModals() {
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('open'));
    }

    // Init
    renderListe();
</script>

</body>
</html>
